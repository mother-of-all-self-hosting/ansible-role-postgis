---
- name: (Deprecation) Catch and report renamed settings
  ansible.builtin.fail:
    msg: >-
      Your configuration contains a variable, which now has a different name.
      Please change your configuration to rename the variable (`{{ item.old }}` -> `{{ item.new }}`).
  when: "lookup('ansible.builtin.varnames', ('^' + item.old + '$'), wantlist=True) | length > 0"
  with_items:
    - { "old": "postgis_vacuum_database", "new": "<superseded by postgis_vacuum_default_databases_list>" }
    - { "old": "postgis_additional_databases", "new": "postgis_managed_databases" }
    - { "old": "postgis_vacuum_command", "new": "<superseded by postgis_vacuum_presets and postgis_vacuum_preset, or postgis_vacuum_query>" }
    - { "old": "docker_postgis_container_image_registry_prefix", "new": "postgis_container_image_registry_prefix" }
    - { "old": "postgis_pgloader_container_image_name_prefix", "new": "postgis_pgloader_container_image_registry_prefix" }
    - { "old": "postgis_pgloader_docker_image", "new": "postgis_pgloader_container_image" }
    - { "old": "postgis_container_image_force_pull", "new": "<removed> (the new community.docker.docker_image_pull module handles this natively)" }
    - { "old": "postgis_pgloader_container_image_force_pull", "new": "<removed> (the new community.docker.docker_image_pull module handles this natively)" }

- name: Fail if required PostGIS settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`).
  when: "lookup('vars', item, default='') | string | length == 0"
  with_items:
    - postgis_identifier
    - postgis_uid
    - postgis_gid
    - postgis_container_network
    - postgis_connection_hostname
    - postgis_connection_port
    - postgis_connection_username
    - postgis_connection_password
    - postgis_db_name
    - postgis_architecture

- name: Fail if PostGIS password length exceeded
  ansible.builtin.fail:
    msg: "The maximum `postgis_connection_password` length is 99 characters"
  when: "postgis_connection_password | length > 99"
