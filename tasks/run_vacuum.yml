---
# Pre-checks

# Defaults

- name: Set postgis_start_wait_time, if not provided
  ansible.builtin.set_fact:
    postgis_start_wait_time: 15
  when: "postgis_start_wait_time | default('') == ''"

- name: Set postgis_vacuum_wait_time, if not provided
  ansible.builtin.set_fact:
    postgis_vacuum_wait_time: "{{ 7 * 86400 }}"
  when: "postgis_vacuum_wait_time | default('') == ''"

- name: Set postgis_vacuum_databases_list, if not provided
  ansible.builtin.set_fact:
    postgis_vacuum_databases_list: "{{ postgis_vacuum_default_databases_list }}"
  when: "postgis_vacuum_databases_list | default([]) | length == 0"

- name: Set postgis_vacuum_preset, if not provided
  ansible.builtin.set_fact:
    postgis_vacuum_preset: vacuum-complete
  when: "postgis_vacuum_preset | default('') == ''"

- name: Exit if postgis_vacuum_preset is unrecognized
  ansible.builtin.fail:
    msg: "Urecognized preset: {{ postgis_vacuum_preset }}"
  when: "postgis_vacuum_preset not in postgis_vacuum_presets.keys()"

- name: Set postgis_vacuum_stops_services, if not provided
  ansible.builtin.set_fact:
    postgis_vacuum_stops_services: "{{ postgis_vacuum_presets[postgis_vacuum_preset].stopsServices }}"
  when: "postgis_vacuum_stops_services | default('') == ''"

- name: Set postgis_vacuum_query, if not provided
  ansible.builtin.set_fact:
    postgis_vacuum_query: "{{ postgis_vacuum_presets[postgis_vacuum_preset].query }}"
  when: "postgis_vacuum_query | default('') == ''"

# Actual vacuuming work

- name: Ensure PostGIS service is started
  ansible.builtin.service:
    name: "{{ postgis_identifier }}"
    state: started
    daemon_reload: true
  register: postgis_ensure_started_result

- name: Wait a bit, so that PostGIS can start
  when: postgis_ensure_started_result.changed | bool
  ansible.builtin.wait_for:
    timeout: "{{ postgis_start_wait_time }}"
  delegate_to: 127.0.0.1
  become: false

- name: Detect existing PostGIS version
  ansible.builtin.import_tasks: tasks/detect_existing_postgis_version.yml

- name: Abort, if no existing PostGIS version detected
  ansible.builtin.fail:
    msg: "Could not find existing PostGIS installation"
  when: "not postgis_detected_existing | bool"

- name: Ensure services are stopped before PostGIS vacuuming, if necessary
  when: postgis_vacuum_stops_services | bool
  ansible.builtin.service:
    name: "{{ item }}"
    state: stopped
    daemon_reload: true
  with_items: "{{ postgis_systemd_services_to_stop_for_maintenance_list }}"

# If PostGIS is up from before, but it had originally been installed on a different container network,
# trying to vacuum databases by connecting to `postgis_container_network` would fail.
# For this reason, we determine and use the currently used network.
# Restarting the service later would put it in the current network.
- name: Check PostGIS container network
  ansible.builtin.command: "{{ devture_systemd_docker_base_host_command_docker }} container inspect {{ postgis_identifier }} --format '{% raw %}{{.HostConfig.NetworkMode}}{% endraw %}'"
  register: postgis_container_network_check_result
  changed_when: false

- name: Set PostGIS container network to use for vacuuming databases
  ansible.builtin.set_fact:
    postgis_container_network_for_vacuuming: "{{ postgis_container_network_check_result.stdout }}"

- name: Generate PostGIS database vacuum command
  ansible.builtin.set_fact:
    postgis_vacuum_run_command: >-
      {{ devture_systemd_docker_base_host_command_docker }} run
      --rm
      --name={{ postgis_identifier }}-vacuum
      --user={{ postgis_container_uid }}:{{ postgis_container_gid }}
      --cap-drop=ALL
      --network={{ postgis_container_network_for_vacuuming }}
      --env-file={{ postgis_base_path }}/env-postgis-psql
      {{ postgis_detected_version_corresponding_container_image }}
      /bin/sh -c 'for db in {{ postgis_vacuum_databases_list | join(" ") }}; do echo "VACUUM start: $db"; if ! psql -v ON_ERROR_STOP=1 -h {{ postgis_identifier }} "$db" -c "{{ postgis_vacuum_query }}"; then echo "VACUUM failed: $db"; exit 1; fi; echo "VACUUM done: $db"; done; echo "VACUUM completed for all databases"'

- name: Note about PostGIS vacuum alternative
  ansible.builtin.debug:
    msg: >-
      Running vacuum against the databases `{{ postgis_vacuum_databases_list | join(", ") }}` with the following PostGIS command:
      `{{ postgis_vacuum_run_command }}`.
      If this crashes, you can stop all processes which may use the database (`systemctl stop example.service another.service`),
      start PostGIS only (`systemctl start {{ postgis_identifier }}`)
      and manually run the above command directly on the server.

- name: Run PostGIS vacuum command
  ansible.builtin.command:
    cmd: "{{ postgis_vacuum_run_command }}"
  async: "{{ postgis_vacuum_wait_time }}"
  poll: "{{ postgis_vacuum_poll_interval }}"
  register: postgis_vacuum_result
  failed_when: not postgis_vacuum_result.finished or postgis_vacuum_result.rc != 0
  changed_when: postgis_vacuum_result.finished and postgis_vacuum_result.rc == 0

# Intentionally show the results
- ansible.builtin.debug:
    var: "postgis_vacuum_result"

- name: Ensure PostGIS is stopped (if it previously was)
  when: postgis_ensure_started_result.changed | bool
  ansible.builtin.service:
    name: "{{ postgis_identifier }}"
    state: stopped

- name: Ensure services are started back up after PostGIS vacuuming, if necessary
  when: postgis_vacuum_stops_services | bool
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    daemon_reload: true
  with_items: "{{ postgis_systemd_services_to_stop_for_maintenance_list }}"
