---
- name: Fail if util called incorrectly (missing postgis_db_migration_request)
  ansible.builtin.fail:
    msg: "The `postgis_db_migration_request` variable needs to be provided to this util."
  when: "postgis_db_migration_request is not defined"

- name: Fail if util called incorrectly (invalid postgis_db_migration_request)
  ansible.builtin.fail:
    msg: "The `postgis_db_migration_request` variable needs to contain `{{ item }}`."
  with_items:
    - src
    - dst
    - caller
    - engine_variable_name
    - systemd_services_to_stop
  when: "item not in postgis_db_migration_request"

- name: Check if the provided source database file exists
  ansible.builtin.stat:
    path: "{{ postgis_db_migration_request.src }}"
  register: postgis_db_migration_request_src_stat_result

- name: Fail if provided source database file doesn't exist
  ansible.builtin.fail:
    msg: "File cannot be found on the server at {{ postgis_db_migration_request.src }}"
  when: "not postgis_db_migration_request_src_stat_result.stat.exists"

- when: "postgis_pgloader_container_image_self_build | bool"
  block:
    - name: Ensure pgloader repository is present on self-build
      ansible.builtin.git:
        repo: "{{ postgis_pgloader_container_image_self_build_repo }}"
        dest: "{{ postgis_pgloader_container_image_self_build_src_path }}"
        version: "{{ postgis_pgloader_container_image_self_build_repo_branch }}"
        force: "yes"
      become: true
      become_user: "{{ postgis_uid }}"
      register: postgis_pgloader_git_pull_results

    # If `stable` is used, we hit an error when processing /opt/src/pgloader/build/quicklisp/dists/quicklisp/software/uax-15-20201220-git/data/CompositionExclusions.txt:
    # > the octet sequence #(194) cannot be decoded
    #
    # The issue is described here and is not getting fixed for months: https://github.com/dimitri/pgloader/pull/1179
    #
    # Although we're not using the dimitri/pgloader image, the one we're using suffers from the same problem.
    - name: Switch pgloader base image from Debian stable (likely 10.x/Buster) to Bullseye
      ansible.builtin.lineinfile:
        path: "{{ postgis_pgloader_container_image_self_build_src_path }}/Dockerfile"
        regexp: "{{ item.match }}"
        line: "{{ item.replace }}"
      with_items:
        - match: "^FROM debian:stable-slim as builder$"
          replace: "FROM debian:bullseye-slim as builder"
        - match: "^FROM debian:stable-slim$"
          replace: "FROM debian:bullseye-slim"

    - name: Ensure pgloader container image is built
      community.docker.docker_image:
        name: "{{ postgis_pgloader_container_image }}"
        source: build
        force_source: "{{ postgis_pgloader_git_pull_results.changed if ansible_version.major > 2 or ansible_version.minor >= 8 else omit }}"
        force: "{{ omit if ansible_version.major > 2 or ansible_version.minor >= 8 else postgis_pgloader_git_pull_results.changed }}"
        build:
          dockerfile: Dockerfile
          path: "{{ postgis_pgloader_container_image_self_build_src_path }}"
          pull: true

- name: Ensure pgloader container image is pulled
  community.docker.docker_image:
    name: "{{ postgis_pgloader_container_image }}"
    source: "{{ 'pull' if ansible_version.major > 2 or ansible_version.minor > 7 else omit }}"
    force_source: "{{ postgis_pgloader_container_image_force_pull if ansible_version.major > 2 or ansible_version.minor >= 8 else omit }}"
    force: "{{ omit if ansible_version.major > 2 or ansible_version.minor >= 8 else postgis_pgloader_container_image_force_pull }}"
  when: "not postgis_pgloader_container_image_self_build"

# Defaults

- name: Set postgis_start_wait_time, if not provided
  ansible.builtin.set_fact:
    postgis_start_wait_time: 15
  when: "postgis_start_wait_time | default('') == ''"

# Actual import work

# Postgres is most likely started already
- name: Ensure Postgres service is started
  ansible.builtin.service:
    name: "{{ postgis_identifier }}"
    state: started
    daemon_reload: true
  register: postgis_ensure_started_result

- name: Wait a bit, so that Postgres can start
  ansible.builtin.wait_for:
    timeout: "{{ postgis_start_wait_time }}"
  delegate_to: 127.0.0.1
  become: false
  when: "postgis_ensure_started_result.changed | bool"

# We only stop services here, leaving it to the caller to start them later.
#
# We can't start them, because they probably need to be reconfigured too (changing the configuration from using SQLite to Postgres, etc.),
# before starting.
#
# Since the caller will be starting them, it might make sense to leave stopping to it as well.
# However, we don't do it, because it's simpler having it here, and it also gets to happen only if we'll be doing an import.
# If we bailed out (somewhere above), nothing would have gotten stopped. It's nice to leave this running in such cases.
- name: Ensure systemd services blocking the database import are stopped
  ansible.builtin.service:
    name: "{{ item }}"
    state: stopped
  failed_when: false
  with_items: "{{ postgis_db_migration_request.systemd_services_to_stop }}"

- name: Import {{ postgis_db_migration_request.engine_old }} database from {{ postgis_db_migration_request.src }} into Postgres # noqa name[template]
  ansible.builtin.command:
    cmd: >-
      {{ devture_systemd_docker_base_host_command_docker }} run
      --rm
      --user={{ postgis_container_uid }}:{{ postgis_container_gid }}
      --cap-drop=ALL
      --network={{ postgis_container_network }}
      --mount type=bind,src={{ postgis_db_migration_request.src }},dst=/in.db,ro
      --entrypoint={{ postgis_container_shell_path }}
      {{ postgis_pgloader_container_image }}
      -c
      'pgloader {{ postgis_db_migration_request.pgloader_options | default([]) | join(' ') }} /in.db {{ postgis_db_migration_request.dst }}'
  register: postgis_migrate_db_to_postgis_import_result
  changed_when: postgis_migrate_db_to_postgis_import_result.rc == 0

- when: "postgis_db_migration_request.additional_psql_statements_list | default([]) | length > 0"
  block:
    - ansible.builtin.include_role:
        name: "{{ ansible_role_name }}"
        tasks_from: detect_existing_postgis_version

    - when: postgis_detected_existing | bool
      ansible.builtin.set_fact:
        postgis_container_image_to_use: "{{ postgis_detected_version_corresponding_container_image }}"

    - name: Execute additional Postgres SQL migration statements
      ansible.builtin.command:
        cmd: >-
          {{ devture_systemd_docker_base_host_command_docker }} run
          --rm
          --user={{ postgis_container_uid }}:{{ postgis_container_gid }}
          --cap-drop=ALL
          --env-file={{ postgis_base_path }}/env-postgres-psql
          --network={{ postgis_container_network }}
          {{ postgis_container_image_to_use }}
          psql --host={{ postgis_identifier }} --dbname={{ postgis_db_migration_request.additional_psql_statements_db_name }} --command='{{ item }}'
      with_items: "{{ postgis_db_migration_request.additional_psql_statements_list }}"
      register: postgis_migrate_db_to_postgis_additional_queries_result
      changed_when: postgis_migrate_db_to_postgis_additional_queries_result.rc == 0

- name: Archive {{ postgis_db_migration_request.engine_old }} database ({{ postgis_db_migration_request.src }} -> {{ postgis_db_migration_request.src }}.backup) # noqa name[template]
  ansible.builtin.command:
    cmd: "mv {{ postgis_db_migration_request.src }} {{ postgis_db_migration_request.src }}.backup"
  register: postgis_migrate_db_to_postgis_move_result
  changed_when: postgis_migrate_db_to_postgis_move_result.rc == 0

- name: Inject result
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "NOTE: Your " + postgis_db_migration_request.engine_old + " database file has been imported into Postgres. The original database file has been moved from `" + postgis_db_migration_request.src + "` to `" + postgis_db_migration_request.src + ".backup`. When you've confirmed that the import went well and everything works, you should be able to safely delete this file."
        ]
      }}

- name: Ensure Postgres is stopped (if it previously was)
  when: "postgis_ensure_started_result.changed | bool"
  ansible.builtin.service:
    name: "{{ postgis_identifier }}"
    state: stopped
