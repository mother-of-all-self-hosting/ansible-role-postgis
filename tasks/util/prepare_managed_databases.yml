---
- name: Ensure Postgres service is started
  ansible.builtin.service:
    name: "{{ postgis_identifier }}"
    state: started
    daemon_reload: true
  register: postgis_ensure_started_result

- name: Wait a bit, so that Postgres can start
  when: postgis_ensure_started_result.changed | bool
  ansible.builtin.wait_for:
    timeout: "{{ postgis_managed_databases_postgis_start_wait_timeout_seconds }}"
  delegate_to: 127.0.0.1
  become: false

# If Postgres is up from before, but it had originally been installed on a different container network,
# trying to prepare databases by connecting to `postgis_container_network` would fail.
# For this reason, we determine and use the currently used network.
# Restarting the service later would put it in the current network.
- name: Check Postgres container network
  ansible.builtin.command: "{{ devture_systemd_docker_base_host_command_docker }} container inspect {{ postgis_identifier }} --format '{% raw %}{{.HostConfig.NetworkMode}}{% endraw %}'"
  register: postgis_container_network_check_result
  changed_when: false

- name: Set Postgres container network to use for preparing databases
  ansible.builtin.set_fact:
    postgis_container_network_for_preparing_databases: "{{ postgis_container_network_check_result.stdout }}"

- name: Detect managed databases with invalid fields
  ansible.builtin.set_fact:
    postgis_managed_databases_with_missing_keys: >-
      {%- set result = [] -%}
      {%- for db in postgis_managed_databases -%}
        {%- set missing = ['name', 'username', 'password'] | difference(db.keys() | list) -%}
        {%- if missing | length > 0 -%}
          {%- set _ = result.append({'name': db.name | default('<unknown>'), 'missing': missing}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ result }}
  no_log: true

- name: Fail if managed database data appears invalid
  ansible.builtin.fail:
    msg: >-
      The following managed database definitions lack required keys:
      {% for db in postgis_managed_databases_with_missing_keys %}
      {{ db.name }} (missing: {{ db.missing | join(', ') }}){% if not loop.last %}, {% endif %}
      {% endfor %}
  when: postgis_managed_databases_with_missing_keys | length > 0

- name: Initialize managed databases
  no_log: true
  when: postgis_managed_databases | length > 0
  block:
    - name: Create managed database initialization SQL file
      ansible.builtin.template:
        src: "{{ role_path }}/templates/sql/init-managed-dbs-user-and-role.sql.j2"
        dest: "/tmp/{{ postgis_identifier }}-init-managed-dbs-user-and-role.sql"
        mode: "0600"
        owner: "{{ postgis_uid }}"
        group: "{{ postgis_gid }}"

    - name: Execute Postgres managed database initialization SQL file
      ansible.builtin.command:
        cmd: >-
          {{ devture_systemd_docker_base_host_command_docker }} run
          --rm
          --user={{ postgis_container_uid }}:{{ postgis_container_gid }}
          {% if postgis_container_cap_drop_all_enabled %}
          --cap-drop=ALL
          {% endif %}
          --env-file={{ postgis_base_path }}/env-postgres-psql
          --network={{ postgis_container_network_for_preparing_databases }}
          --mount type=bind,src=/tmp/{{ postgis_identifier }}-init-managed-dbs-user-and-role.sql,dst=/{{ postgis_identifier }}-init-managed-dbs-user-and-role.sql,ro
          --entrypoint={{ postgis_container_shell_path }}
          {{ postgis_container_image_to_use }}
          -c
          'psql -v ON_ERROR_STOP=0 -h {{ postgis_connection_hostname }} --file=/{{ postgis_identifier }}-init-managed-dbs-user-and-role.sql'
      changed_when: true
      register: postgis_managed_dbs_init_result
      failed_when: >-
        (postgis_managed_dbs_init_result.stderr | default('')) is search('(?m)^ERROR:')
        or
        (postgis_managed_dbs_init_result.stdout | default('')) is search('(?m)^ERROR:')

    - name: Delete managed database initialization SQL file
      ansible.builtin.file:
        path: /tmp/{{ postgis_identifier }}-init-managed-dbs-user-and-role.sql
        state: absent

- name: Ensure Postgres is stopped, if it originally was and if we are configured to do it
  when: postgis_systemd_service_stop_originally_stopped_after_preparation | bool and postgis_ensure_started_result.changed | bool
  ansible.builtin.service:
    name: "{{ postgis_identifier }}"
    state: stopped
