---
# Pre-checks

- name: Fail if playbook called incorrectly
  ansible.builtin.fail:
    msg: "The `server_path_postgis_dump` variable needs to be provided to this playbook, via --extra-vars"
  when: "server_path_postgis_dump is not defined or server_path_postgis_dump.startswith('<')"

- name: Check if the provided Postgres dump file exists
  ansible.builtin.stat:
    path: "{{ server_path_postgis_dump }}"
  register: result_server_path_postgis_dump_stat

- name: Fail if provided Postgres dump file doesn't exists
  ansible.builtin.fail:
    msg: "File cannot be found on the server at {{ server_path_postgis_dump }}"
  when: "not result_server_path_postgis_dump_stat.stat.exists"

# Defaults

- name: Set postgis_start_wait_time, if not provided
  ansible.builtin.set_fact:
    postgis_start_wait_time: 15
  when: "postgis_start_wait_time | default('') == ''"

- name: Set postgis_import_wait_time, if not provided
  ansible.builtin.set_fact:
    postgis_import_wait_time: "{{ 7 * 86400 }}"
  when: "postgis_import_wait_time | default('') == ''"

# By default, we connect and import into the main (`default`) database.
# Single-database dumps may wish to import into a specific database instead by passing an `postgis_default_import_database` extra-vars variable.
- name: Set postgis_default_import_database, if not provided
  ansible.builtin.set_fact:
    postgis_default_import_database: "{{ postgis_db_name }}"
  when: "postgis_default_import_database | default('') == ''"

# Actual import work

- name: Ensure Postgres service is started
  ansible.builtin.service:
    name: "{{ postgis_identifier }}"
    state: started
    daemon_reload: true
  register: postgis_ensure_started_result

- name: Wait a bit, so that Postgres can start
  when: "postgis_ensure_started_result.changed | bool"
  ansible.builtin.wait_for:
    timeout: "{{ postgis_start_wait_time }}"
  delegate_to: 127.0.0.1
  become: false

- ansible.builtin.import_tasks: tasks/detect_existing_postgis_version.yml

- name: Abort, if no existing Postgres version detected
  ansible.builtin.fail:
    msg: "Could not find existing Postgres installation"
  when: "not postgis_detected_existing | bool"

# Starting the database container had automatically created the default
# role (`postgis_connection_username`) and database (`postgis_db_name`).
# The dump most likely contains those same entries and would try to re-create them, leading to errors.
# We need to skip over those lines.
- name: Generate Postgres database import command
  ansible.builtin.set_fact:
    postgis_import_command: >-
      {{ devture_systemd_docker_base_host_command_docker }} run --rm --name {{ postgis_identifier }}-import
      --log-driver=none
      --user={{ postgis_container_uid }}:{{ postgis_container_gid }}
      --cap-drop=ALL
      --network={{ postgis_container_network }}
      --env-file={{ postgis_base_path }}/env-postgis-psql
      --mount type=bind,src={{ server_path_postgis_dump }},dst=/{{ server_path_postgis_dump | basename }},ro
      --entrypoint={{ postgis_container_shell_path }}
      {{ postgis_detected_version_corresponding_container_image }}
      -c "set -o pipefail && cat /{{ server_path_postgis_dump | basename }} |
      {{ 'gunzip |' if server_path_postgis_dump.endswith('.gz') else '' }}
      {{ 'unzstd |' if server_path_postgis_dump.endswith('.zst') else '' }}
      {% if postgis_import_roles_to_ignore | length > 0 %}
      grep -vE '{{ postgis_import_roles_ignore_regex }}' |
      {% endif %}
      {% if postgis_import_databases_to_ignore | length > 0 %}
      grep -vE '{{ postgis_import_databases_ignore_regex }}' |
      {% endif %}
      {% if postgis_import_schemas_to_ignore | length > 0 %}
      grep -vE '{{ postgis_import_schemas_ignore_regex }}' |
      {% endif %}
      psql -b -v ON_ERROR_STOP=1 -h {{ postgis_identifier }} --dbname={{ postgis_default_import_database }}"
  tags:
    - skip_ansible_lint

# This is a hack.
# See: https://ansibledaily.com/print-to-standard-output-without-escaping/
#
# We want to run `debug: msg=".."`, but that dumps it as JSON and escapes double quotes within it,
# which ruins the command (`postgis_import_command`)
- name: Note about Postgres importing alternative
  ansible.builtin.set_fact:
    dummy: true
  with_items:
    - >-
      Importing Postgres database using the following command: `{{ postgis_import_command }}`.
      If this crashes, you can stop Postgres (`systemctl stop {{ postgis_identifier }}`),
      delete its existing data (`rm -rf {{ postgis_data_path }}/*`), start it again (`systemctl start {{ postgis_identifier }}`)
      and manually run the above import command directly on the server.

- name: Perform Postgres database import
  ansible.builtin.command:
    cmd: "{{ postgis_import_command }}"
  async: "{{ postgis_import_wait_time }}"
  poll: 10
  register: postgis_import_postgis_command_result
  failed_when: not postgis_import_postgis_command_result.finished or postgis_import_postgis_command_result.rc != 0
  changed_when: postgis_import_postgis_command_result.finished and postgis_import_postgis_command_result.rc == 0

- name: Ensure Postgres is stopped (if it previously was)
  when: "postgis_ensure_started_result.changed | bool"
  ansible.builtin.service:
    name: "{{ postgis_identifier }}"
    state: stopped
