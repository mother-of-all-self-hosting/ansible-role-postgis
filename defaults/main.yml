---
# Project source code URL: https://github.com/postgres/postgres

postgis_enabled: true

# postgis_identifier controls the identifier of this Postgres instance, which influences:
# - the default storage path
# - the names of systemd services
# - the names of various helper scripts
# - the names of temporary files
postgis_identifier: 'postgres'

postgis_base_path: "/{{ postgis_identifier }}"
postgis_data_path: "{{ postgis_base_path }}/data"
# The host path where the Postgres unix socket directory is mounted (when enabled).
postgis_run_path: "{{ postgis_base_path }}/run"
# The path where the data directory is bind-mounted to inside the container.
# Previously, we used `/var/lib/postgresql/data` for this, but Postgres v18+ made `/var/lib/postgresql` a VOLUME,
# so we can't bind-mount a directory beneath it. It's better to use something completely different (like `/data`) instead.
# Related to: `postgis_server_environment_variable_pgdata`
postgis_data_in_container_path: "/data"
postgis_bin_path: "{{ postgis_base_path }}/bin"

postgis_uid: ""
postgis_gid: ""

postgis_connection_hostname: "{{ postgis_identifier }}"
postgis_connection_port: 5432
postgis_connection_username: "root"
postgis_connection_password: ""
postgis_db_name: "main"

postgis_default_lc_collate: C
postgis_default_lc_type: C
postgis_default_encoding: UTF8

# pgtune.leopard.in.ua implementation in ansible, based on https://github.com/le0pard/pgtune/blob/master/src/features/configuration/configurationSlice.js
# The following block calculates optimal defaults, based on server's CPU and RAM, all calculations are in kb
postgis_memtotal_kb: "{{ ansible_facts['memtotal_mb']*1024|int }}"
postgis_data_storage: ssd # possible values: ssd, hdd
postgis_max_connections: 200
postgis_shared_buffers: "{{ postgis_memtotal_kb|int/4 }}"
postgis_effective_cache_size: "{{ (postgis_memtotal_kb|int*3)/4 }}"
postgis_maintenance_work_mem: "{{ 2097152 if (postgis_memtotal_kb|int/16)/1024 >= 2048 else postgis_memtotal_kb|int/16 }}"
postgis_checkpoint_completion_target: 0.9
postgis_wal_buffers: "{{ 16384 if ((postgis_shared_buffers|int*3)/100)/1024 >= 16 else postgis_shared_buffers|int }}" # 16mb
postgis_min_wal_size: 1048576 # 1gb
postgis_max_wal_size: 4194304 # 4gb
postgis_default_statistics_target: 100
postgis_random_page_cost: "{{ 1.1 if postgis_data_storage == 'ssd' else 4 }}"
postgis_effective_io_concurrency: "{{ 200 if postgis_data_storage == 'ssd' else 2 }}"
postgis_max_worker_processes: "{{ ansible_facts['processor_nproc'] }}"
postgis_max_parallel_workers: "{{ ansible_facts['processor_nproc'] }}"
postgis_max_parallel_workers_per_gather: "{{ (4 if ansible_facts['processor_nproc']/2 > 4 else ansible_facts['processor_nproc']|int/2) | round(0, 'ceil') | int }}"
postgis_max_parallel_maintenance_workers: "{{ (4 if ansible_facts['processor_nproc']/2 > 4 else ansible_facts['processor_nproc']|int/2) | round(0, 'ceil') | int }}"
postgis_work_mem_raw: "{{ ((postgis_memtotal_kb|int - postgis_shared_buffers|int)/(postgis_max_connections|int*3))/postgis_max_parallel_workers_per_gather|int }}"
postgis_work_mem: "{{ 64 if postgis_work_mem_raw|int <= 64 else postgis_work_mem_raw|int }}"
postgis_huge_pages: "{{ 'off' if postgis_memtotal_kb|int/1024/1024 < 32 else 'try' }}"

# Poll interval (seconds) while waiting for vacuum async job completion
postgis_vacuum_poll_interval: 2

# postgis_initdb_args controls POSTGRES_INITDB_ARGS
postgis_initdb_args: "{{ postgis_initdb_args_list | join(' ') }}"

postgis_initdb_args_list: "{{ postgis_initdb_args_list_default + postgis_initdb_args_list_auto + postgis_initdb_args_list_custom }}"
postgis_initdb_args_list_default:
  - "--lc-collate {{ postgis_default_lc_collate }}"
  - "--lc-ctype {{ postgis_default_lc_type }}"
  - "--encoding {{ postgis_default_encoding }}"
postgis_initdb_args_list_auto: []
postgis_initdb_args_list_custom: []

# postgis_systemd_services_to_stop_for_maintenance_list specifies the list of systemd services to stop before upgrading or vacuuming (for certain vacuum operations).
# These services will be restarted after the operation completes.
postgis_systemd_services_to_stop_for_maintenance_list: "{{ postgis_systemd_services_to_stop_for_maintenance_list_auto + postgis_systemd_services_to_stop_for_maintenance_list_custom }}"
# postgis_systemd_services_to_stop_for_maintenance_list_auto is for use by the playbook that wraps this role.
# For your own custom definitions, see postgis_systemd_services_to_stop_for_maintenance_list_custom.
postgis_systemd_services_to_stop_for_maintenance_list_auto: []
postgis_systemd_services_to_stop_for_maintenance_list_custom: []

# Controls whether this role will stop the Postgres systemd service it had started after having prepared it.
#
# As part of the installation process, this role may bring up the Postgres service
# and run some queries against it to prepare the additional databases, etc.
# If the service was originally stopped before these preparations and we started it just to prepare it,
# this setting would control whether we'd restore it to a stopped state.
#
# If Postgres was already running, it wouldn't be stopped after preparation regardless of the value of this variable.
#
# This setting only affects Postgres stopping as part of the preparation process.
# Other parts of this role (importing, vacuuming, etc.) may also start an originally stopped Postgres to do their work.
# These other parts will continue stopping such an originally-stopped Postgres regardless of this setting.
#
# We default this to false (don't stop), because it provides for a smoother installation experience with less stopping/starting.
# Before this setting got introduced, we used to stop the service (if it's us that started it),
# but this is now seen as wasteful work, which could delay the installation process.
postgis_systemd_service_stop_originally_stopped_after_preparation: false

# postgis_vacuum_presets contains various presets related to vacuuming (`--tags=run-postgres-vacuum`).
# See: https://www.postgresql.org/docs/current/sql-vacuum.html
#
# `stopServices` specifies whether services (see `postgis_systemd_services_to_stop_for_maintenance_list`)
# need to be stopped before a vacuuming query runs.
postgis_vacuum_presets:
  vacuum-complete:
    query: "VACUUM FULL VERBOSE ANALYZE"
    stopsServices: true
  vacuum-full:
    query: "VACUUM FULL VERBOSE"
    stopsServices: true
  vacuum:
    query: "VACUUM VERBOSE"
    stopsServices: false
  vacuum-analyze:
    query: "VACUUM VERBOSE ANALYZE"
    stopsServices: false
  analyze:
    query: "ANALYZE VERBOSE"
    stopsServices: false

# postgis_vacuum_default_databases_list specifies a list of databases to vacuum when running `--tags=run-postgres-vacuum`,
# unless a `postgis_vacuum_databases_list` extra argument is provided
postgis_vacuum_default_databases_list: |
  {{
    (
        ([postgis_db_name])
        +
        (postgis_managed_databases | map(attribute='name'))
    ) | unique
  }}

postgis_architecture: amd64

# The base container network. It will be auto-created by this role if it doesn't exist already.
postgis_container_network: "{{ postgis_identifier }}"

# Control if the container network is deleted on uninstalling.
postgis_container_network_deletion_enabled: true

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
postgis_container_additional_networks: "{{ postgis_container_additional_networks_auto + postgis_container_additional_networks_custom }}"
postgis_container_additional_networks_auto: []
postgis_container_additional_networks_custom: []

postgis_container_image_registry_prefix: "{{ postgis_container_image_registry_prefix_upstream }}"
postgis_container_image_registry_prefix_upstream: "{{ postgis_container_image_registry_prefix_upstream_default }}"
postgis_container_image_registry_prefix_upstream_default: "docker.io/"

# postgis_container_image_suffix controls whether we use Alpine-based images (`-alpine`) or the normal Debian-based images.
# Alpine-based Postgres images are smaller and we usually prefer them, but they don't work on ARM32 (tested on a Raspberry Pi 3 running Raspbian 10.7).
# On ARM32, `-alpine` images fail with the following error:
# > LOG:  startup process (PID 37) was terminated by signal 11: Segmentation fault
postgis_container_image_suffix: "{{ '-alpine' if postgis_architecture in ['amd64', 'arm64'] else '' }}"

postgis_container_image_name: postgres

postgis_container_image_v9: "{{ postgis_container_image_registry_prefix }}{{ postgis_container_image_name }}:{{ postgis_container_image_v9_version }}{{ postgis_container_image_suffix }}"
postgis_container_image_v9_version: "9.6.24"

postgis_container_image_v10: "{{ postgis_container_image_registry_prefix }}{{ postgis_container_image_name }}:{{ postgis_container_image_v10_version }}{{ postgis_container_image_suffix }}"
postgis_container_image_v10_version: "10.23"

postgis_container_image_v11: "{{ postgis_container_image_registry_prefix }}{{ postgis_container_image_name }}:{{ postgis_container_image_v11_version }}{{ postgis_container_image_suffix }}"
postgis_container_image_v11_version: "11.22"

postgis_container_image_v12: "{{ postgis_container_image_registry_prefix }}{{ postgis_container_image_name }}:{{ postgis_container_image_v12_version }}{{ postgis_container_image_suffix }}"
postgis_container_image_v12_version: "12.22"

postgis_container_image_v13: "{{ postgis_container_image_registry_prefix }}{{ postgis_container_image_name }}:{{ postgis_container_image_v13_version }}{{ postgis_container_image_suffix }}"
postgis_container_image_v13_version: "13.23"

postgis_container_image_v14: "{{ postgis_container_image_registry_prefix }}{{ postgis_container_image_name }}:{{ postgis_container_image_v14_version }}{{ postgis_container_image_suffix }}"
postgis_container_image_v14_version: "14.22"

postgis_container_image_v15: "{{ postgis_container_image_registry_prefix }}{{ postgis_container_image_name }}:{{ postgis_container_image_v15_version }}{{ postgis_container_image_suffix }}"
postgis_container_image_v15_version: "15.17"

postgis_container_image_v16: "{{ postgis_container_image_registry_prefix }}{{ postgis_container_image_name }}:{{ postgis_container_image_v16_version }}{{ postgis_container_image_suffix }}"
postgis_container_image_v16_version: "16.13"

postgis_container_image_v17: "{{ postgis_container_image_registry_prefix }}{{ postgis_container_image_name }}:{{ postgis_container_image_v17_version }}{{ postgis_container_image_suffix }}"
postgis_container_image_v17_version: "17.9"

postgis_container_image_v18: "{{ postgis_container_image_registry_prefix }}{{ postgis_container_image_name }}:{{ postgis_container_image_v18_version }}{{ postgis_container_image_suffix }}"
postgis_container_image_v18_version: "18.3"

postgis_container_image_by_major_version:
  "9": "{{ postgis_container_image_v9 }}"
  "10": "{{ postgis_container_image_v10 }}"
  "11": "{{ postgis_container_image_v11 }}"
  "12": "{{ postgis_container_image_v12 }}"
  "13": "{{ postgis_container_image_v13 }}"
  "14": "{{ postgis_container_image_v14 }}"
  "15": "{{ postgis_container_image_v15 }}"
  "16": "{{ postgis_container_image_v16 }}"
  "17": "{{ postgis_container_image_v17 }}"
  "18": "{{ postgis_container_image_v18 }}"

# A list of versions that are allowed to be installed and upgraded to.
# If this is an empty list (`[]`), all versions are allowed.
#
# The `postgis_allowed_versions_auto` variable is meant to be populated by the Ansible playbook automatically.
# You can specify your own additional restrictions in the `postgis_allowed_versions_custom` variable.
# The actual allowed versions will be the intersection of the two.
#
# Example:
# postgis_allowed_versions: [16, 17]
postgis_allowed_versions: "{{ postgis_allowed_versions_custom if postgis_allowed_versions_auto | length == 0 else (postgis_allowed_versions_auto | intersect(postgis_allowed_versions_custom) if postgis_allowed_versions_custom | length > 0 else postgis_allowed_versions_auto) }}"
postgis_allowed_versions_auto: []
postgis_allowed_versions_custom: []

postgis_container_image_latest: "{{ none if postgis_eligible_version_max is none else postgis_container_image_by_major_version[postgis_eligible_version_max | string] }}"

# This variable is assigned at runtime. Overriding its value has no effect.
postgis_container_image_to_use: '{{ postgis_container_image_latest }}'

postgis_container_image_force_pull: "{{ postgis_container_image_to_use.endswith(':latest') }}"

# Controls how long to wait for the container to stop gracefully before killing it.
# Because `devture_systemd_docker_base_container_stop_grace_time_seconds` may be quite short and databases are more important to stop gracefully,
# we default to at least 30 seconds.
postgis_container_stop_grace_time_seconds: "{{ [devture_systemd_docker_base_container_stop_grace_time_seconds, 30] | max }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
postgis_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
postgis_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
postgis_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ postgis_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ postgis_container_stop_grace_time_seconds }} {{ postgis_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ postgis_identifier }} >/dev/null 2>&1 || true;
  rm -f {{ postgis_run_path }}/.s.PGSQL.* >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ postgis_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ postgis_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ postgis_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ postgis_identifier }} after {{ postgis_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

# Controls the user that the container runs as. Set to `0` to run as root.
postgis_container_uid: "{{ postgis_uid }}"

# Controls the group that the container runs as. Set to `0` to run as root.
postgis_container_gid: "{{ postgis_gid }}"

# Controls whether the container will be started with a read-only filesystem.
postgis_container_read_only_enabled: true

# Controls whether the container will be started with dropped privileges (`--cap-drop=ALL`)
postgis_container_cap_drop_all_enabled: true

# Controls whether the host's /etc/passwd file is mounted (as read-only) into the container (at /etc/passwd).
#
# When running as root, we don't need to do this, as the container would likely switch to an account it already contains in its own /etc/passwd file.
#
# When running as non-root, we likely need to do this as we'd like for the UID (`postgis_uid`) we run as to resolve to a named user,
# which likely already exists in the host's /etc/passwd file.
postgis_container_mount_etc_passwd_enabled: "{{ postgis_uid != 0 }}"

# Specify the size of the container's tmpfs volume (/tmp)
postgis_container_tmpfs_tmp_size: 128m

# Specify the size of the container's tmpfs volume (/run/postgresql)
postgis_container_tmpfs_run_size: 128m

# Controls whether the Postgres unix socket directory is bind-mounted from the host.
# When enabled, the socket will be available under `postgis_run_path` on the host,
# while TCP connections keep working as usual.
postgis_container_unix_socket_enabled: true

# The unix socket directory inside the container.
postgis_run_path_in_container: "/run/postgresql"

# Controls whether the helper CLI scripts prefer unix socket connections (when available)
# instead of TCP. This does not affect server behavior.
postgis_cli_use_unix_socket_enabled: "{{ postgis_container_unix_socket_enabled }}"

# A list of extra arguments to pass to the container (`docker create` command)
postgis_container_extra_arguments: "{{ postgis_container_extra_arguments_auto + postgis_container_extra_arguments_custom }}"
postgis_container_extra_arguments_auto: []
postgis_container_extra_arguments_custom: []

postgis_postgis_process_extra_arguments_default: [
  "-c 'max_connections={{ postgis_max_connections|int }}'",
  "-c 'shared_buffers={{ (postgis_shared_buffers|int/1024)|int }}MB'",
  "-c 'effective_cache_size={{ (postgis_effective_cache_size|int/1024)|int }}MB'",
  "-c 'maintenance_work_mem={{ (postgis_maintenance_work_mem|int/1024)|int }}MB'",
  "-c 'checkpoint_completion_target={{ postgis_checkpoint_completion_target }}'",
  "-c 'wal_buffers={{ (postgis_wal_buffers|int/1024)|int }}MB'",
  "-c 'default_statistics_target={{ postgis_default_statistics_target|int }}'",
  "-c 'random_page_cost={{ postgis_random_page_cost }}'",
  "-c 'effective_io_concurrency={{ postgis_effective_io_concurrency|int }}'",
  "-c 'work_mem={{ postgis_work_mem|int }}kB'",
  "-c 'huge_pages={{ postgis_huge_pages }}'",
  "-c 'min_wal_size={{ (postgis_min_wal_size|int/1024)|int }}MB'",
  "-c 'max_wal_size={{ (postgis_max_wal_size|int/1024)|int }}MB'",
  "-c 'max_worker_processes={{ postgis_max_worker_processes|int }}'",
  "-c 'max_parallel_workers={{ postgis_max_parallel_workers|int }}'",
  "-c 'max_parallel_workers_per_gather={{ postgis_max_parallel_workers_per_gather|int }}'",
  "-c 'max_parallel_maintenance_workers={{ postgis_max_parallel_maintenance_workers|int }}'"
]
postgis_postgis_process_extra_arguments_unix_socket: "{{ [\"-c 'unix_socket_directories=\" ~ postgis_run_path_in_container ~ \"'\"] if postgis_container_unix_socket_enabled else [] }}"
# postgis_postgis_process_extra_arguments_auto is for use by the playbook that wraps this role.
# For your own custom definitions, see postgis_postgis_process_extra_arguments_custom.
postgis_postgis_process_extra_arguments_auto: []
postgis_postgis_process_extra_arguments_custom: []

# A list of extra arguments to pass to the postgres process
# e.g. "-c 'max_connections=200'"
postgis_process_extra_arguments: "{{ postgis_postgis_process_extra_arguments_default + postgis_postgis_process_extra_arguments_unix_socket + postgis_postgis_process_extra_arguments_auto + postgis_postgis_process_extra_arguments_custom }}"

# Controls whether the Postgres container exposes a port (tcp/5432 in the
# container) that can be used to access the database from outside the container (e.g. with psql)
#
# psql postgresql://username:password@localhost:<port>/database_name
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
postgis_container_postgis_bind_port: ""

postgis_container_shm_size: "256m"

# The shell to use in the container.
# See `postgis_container_image_suffix`.
#
# On Debian-based container images, /bin/sh tends to point to `dash` , which is subpar
# (no `set -o pipefail`, so most of our scripts would fail).
# We'd prefer /bin/bash in such container images.
#
# On Alpine, /bin/sh is /bin/busybox, which is OK.
postgis_container_shell_path: "{{ '/bin/sh' if postgis_container_image_suffix == '-alpine' else '/bin/bash' }}"

postgis_systemd_required_services_list: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"

# A list of databases (and their credentials) that this role will create and manage on the server.
#
# `postgis_managed_databases_auto` is managed by the playbook.
# Your own definitions should go into `postgis_managed_databases_additional`
# See `postgis_managed_databases_additional` for the correct syntax.
postgis_managed_databases: "{{ postgis_managed_databases_auto + postgis_managed_databases_additional }}"

# Additional/managed database definitions managed by the playbook.
# To add your own, use `postgis_managed_databases_additional`
postgis_managed_databases_auto: []

# Your own additional/managed database definitions.
#
# postgis_managed_databases_additional:
#   - name: some_database
#     username: some_username
#     password: some_password
#   - name: another_database
#     username: another_username
#     password: another_password
#     additional_sql_queries:
#       - "SOME QUERY AGAINST MAIN DATABASE HERE;"
#       - "\c another_database;"
#       - "SOME QUERY AGAINST another_database HERE;"
postgis_managed_databases_additional: []

# A list of roles/users to avoid creating when importing (or upgrading) the database.
# If a dump file contains the roles and they've also been created beforehand (see `postgis_managed_databases`),
# importing would fail.
# We either need to not create them or to ignore the `CREATE ROLE` statements in the dump.
postgis_import_roles_to_ignore: "{{ (postgis_import_roles_to_ignore_default + postgis_import_roles_to_ignore_auto + postgis_import_roles_to_ignore_custom) | unique }}"
postgis_import_roles_to_ignore_default: |
  {{
    (
      [postgis_connection_username]
      +
      postgis_managed_databases | map(attribute='username') | list
    ) | unique
  }}
postgis_import_roles_to_ignore_auto: []
postgis_import_roles_to_ignore_custom: []

# When importing an existing Postgres database (when restoring a backup) or when doing a Postgres upgrade (which dumps & restores), we'd like to avoid:
# - creating users (`CREATE ROLE ..`)
# - updating passwords for users (`ALTER ROLE root WITH SUPERUSER INHERIT NOCREATEROLE NOCREATEDB LOGIN NOREPLICATION NOBYPASSRLS PASSWORD 'md5...`)
#
# Both of these operations are done by the playbook anyway.
# Updating passwords is especially undesirable, because older versions hash passwords using md5 and export them as md5 hashes in the dump file,
# which is unsupported by default by newer Postgres versions (v14+).
# When users are created and passwords are set by the playbook, they end up hashed as `scram-sha-256` on Postgres v14+.
# If an md5-hashed password is restored on top, Postgres v14+ will refuse to authenticate users with it by default.
#
# We also allow for the role name to be quoted, which is rare, but might happen for role names which are special keywords (e.g. `default`).
postgis_import_roles_ignore_regex: "^(CREATE|ALTER) ROLE \\\"?({{ postgis_import_roles_to_ignore | join('|') }})\\\"?(;| WITH)"  # noqa jinja[spacing]

# A list of databases to avoid creating when importing (or upgrading) the database.
# If a dump file contains the databases and they've also been created beforehand (see `postgis_managed_databases`),
# importing would fail.
# We either need to not create them or to ignore the `CREATE DATABASE` statements in the dump.
postgis_import_databases_to_ignore: "{{ (postgis_import_databases_to_ignore_default + postgis_import_databases_to_ignore_auto + postgis_import_databases_to_ignore_custom) | unique }}"
postgis_import_databases_to_ignore_default: |
  {{
    (
      [postgis_db_name]
      +
      postgis_managed_databases | map(attribute='name') | list
    ) | unique
  }}
postgis_import_databases_to_ignore_auto: []
postgis_import_databases_to_ignore_custom: []

# We also allow for the database name to be quoted, which is rare, but might happen for database names which are special keywords (e.g. `default`).
postgis_import_databases_ignore_regex: "^CREATE DATABASE \\\"?({{ postgis_import_databases_to_ignore | join('|') }})\\\"?\\s" # noqa jinja[spacing]

# A list of schemas to avoid creating when importing (or upgrading) the database.
postgis_import_schemas_to_ignore: "{{ (postgis_import_schemas_to_ignore_default + postgis_import_schemas_to_ignore_auto + postgis_import_schemas_to_ignore_custom) | unique }}"
postgis_import_schemas_to_ignore_default: []
postgis_import_schemas_to_ignore_auto: []
postgis_import_schemas_to_ignore_custom: []

# We also allow for the schema name to be quoted, which is rare, but might happen for schema names which are special keywords.
postgis_import_schemas_ignore_regex: "^CREATE SCHEMA \\\"?({{ postgis_import_schemas_to_ignore | join('|') }})\\\"?\\s" # noqa jinja[spacing]

# The number of seconds to wait after starting Postgres systemd service
# and before trying to run queries for initializing managed databases/users against it.
#
# For most (subsequent) runs, Postgres would already be running, so no waiting will be happening at all.
#
# On ARM, we wait some more. ARM32 devices are especially known for being slow.
# ARM64 likely don't need such a long delay, but it doesn't hurt too much having it.
postgis_managed_databases_postgis_start_wait_timeout_seconds: "{{ 45 if postgis_architecture in ['arm32', 'arm64'] else 15 }}"

# Defines the `PGDATA` environment variable for the Postgres server.
#
# We explicitly set it to avoid surprises caused by Postgres >= v18 which changed the default value for this
# (from `/var/lib/postgresql/data` to `/var/lib/postgresql/MAJOR/docker`).
# Ref: https://github.com/docker-library/postgres/pull/1259
#
# We intentionally set this to `/data` (see `postgis_data_in_container_path`), not `/var/lib/postgresql/data` (like the old value),
# because `/var/lib/postgresql` is defined as a VOLUME already in the official container image,
# which makes it impossible to bind-mount directories beneath it.
# Ref: https://github.com/docker-library/postgres/pull/1259#issuecomment-2215489177
#
# We could have also adopted the new data layout (used by Postgres v18+), but this necessitates:
# - a data migration (for the files stored in `postgis_data_path`),
# - reworking of our Postgres version detection logic (`tasks/detect_existing_postgis_version.yml`)
# - etc.
#
# The new data layout promises to make it possible to do faster (`pg_upgrade --link`) upgrades between major Postgres versions,
# instead of having to do a dump and restore.
# However, this is an empty promise, because for `pg_upgrade` to work, one also needs to have both old & new Postgres binaries available,
# which is not the case for the official container image.
# As it is now, adopting the new data layout would only lead to pain, without any gain.
#
# Because of all this, we keep the old data layout. In the future, this may change.
postgis_server_environment_variable_pgdata: "{{ postgis_data_in_container_path }}"

postgis_pgloader_container_image_self_build: "{{ postgis_architecture != 'amd64' }}"
postgis_pgloader_container_image_self_build_repo: "https://github.com/illagrenan/pgloader-docker.git"
postgis_pgloader_container_image_self_build_repo_branch: "v{{ postgis_pgloader_container_image_tag }}"
postgis_pgloader_container_image_self_build_src_path: "{{ postgis_base_path }}/pgloader-container-src"

# We use illagrenan/pgloader, instead of the more official dimitri/pgloader image,
# because the official one only provides a `latest` tag.
postgis_pgloader_container_image: "{{ postgis_pgloader_container_image_registry_prefix }}illagrenan/pgloader:{{ postgis_pgloader_container_image_tag }}"
postgis_pgloader_container_image_registry_prefix: "{{ 'localhost/' if postgis_pgloader_container_image_self_build else postgis_pgloader_container_image_registry_prefix_upstream }}"
postgis_pgloader_container_image_registry_prefix_upstream: "{{ postgis_pgloader_container_image_registry_prefix_upstream_default }}"
postgis_pgloader_container_image_registry_prefix_upstream_default: "docker.io/"
postgis_pgloader_container_image_tag: "3.6.2"
postgis_pgloader_container_image_force_pull: "{{ postgis_pgloader_container_image.endswith(':latest') }}"

# postgis_restart_necessary controls whether the Postgres systemd service
# will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed" — appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
postgis_restart_necessary: false
